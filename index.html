<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BULL RUN</title>
<link rel="icon" type="image/png" href="./assets/logo_round.png">
<link rel="apple-touch-icon" href="./assets/logo_round.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;-webkit-user-select:none;user-select:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #timer{
    font-family:"Lilita One","Arial Black",sans-serif;
    font-size:min(26vw,180px);
    color:#a3ff3c;
    letter-spacing:.04em;
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 30px rgba(163,255,60,.65),0 0 90px rgba(163,255,60,.3),0 6px 0 #123,0 10px 24px #000;
    animation:pulse 1s ease-in-out infinite alternate;
  }
  @keyframes pulse{from{transform:scale(1)}to{transform:scale(1.03)}}
</style>
</head>
<body>
<div id="wrap"><div id="timer"></div></div>
<script>
  // Launch time is a fixed timestamp so every visitor sees the same remaining time.
  var TARGET = 1783603119000; // test: 2026-07-09 16:18:39 +03
  var el = document.getElementById('timer');

  function pad(n){ return (n < 10 ? '0' : '') + n; }

  function tick(){
    var left = TARGET - Date.now();
    if (left <= 0){ location.replace('./game.html'); return; }
    var s = Math.ceil(left / 1000);
    var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    el.textContent = h > 0 ? h + ':' + pad(m) + ':' + pad(sec) : pad(m) + ':' + pad(sec);
    setTimeout(tick, 1000 - (Date.now() % 1000));
  }

  if (TARGET - Date.now() <= 0){ location.replace('./game.html'); }
  else { tick(); }
</script>
</body>
</html>
