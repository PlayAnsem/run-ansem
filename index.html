<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>BULL RUN</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#07120f;font-family:"Arial Black","Segoe UI",Arial,sans-serif;-webkit-user-select:none;user-select:none;touch-action:none}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #frame{position:relative;height:100%;aspect-ratio:9/16;max-width:100vw;overflow:hidden;background:#0b241d;box-shadow:0 0 80px rgba(163,255,60,.12)}
  @media (max-aspect-ratio:9/16){#frame{width:100vw;height:100%;aspect-ratio:auto}}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;z-index:5}
  #title{background:#07120f}
  #titleArt{position:absolute;inset:0;background-size:cover;background-position:center top;filter:saturate(1.06)}
  #titleShade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,18,15,0) 45%,rgba(7,18,15,.55) 72%,rgba(7,18,15,.94) 100%)}
  .btn{position:relative;border:none;background:none;cursor:pointer;padding:0;transition:transform .08s ease;-webkit-tap-highlight-color:transparent}
  .btn:active{transform:scale(.93)}
  #playBtn img{width:min(46vw,240px);display:block;filter:drop-shadow(0 6px 24px rgba(163,255,60,.45))}
  #hint{color:#cfeeb0;font-size:13px;font-weight:700;letter-spacing:.4px;text-align:center;margin:14px 16px 8px;text-shadow:0 2px 6px #000;line-height:1.6}
  #bestTitle{color:#ffd23f;font-size:15px;margin-bottom:max(20px,env(safe-area-inset-bottom));text-shadow:0 2px 8px #000;letter-spacing:1px}
  #mute{position:absolute;top:max(10px,env(safe-area-inset-top));right:12px;z-index:9;font-size:24px;width:46px;height:46px;border-radius:12px;border:2px solid rgba(163,255,60,.5);background:rgba(7,18,15,.55);color:#a3ff3c;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
  #hud{position:absolute;top:max(10px,env(safe-area-inset-top));left:12px;right:70px;display:none;z-index:4;pointer-events:none}
  .hudRow{display:flex;gap:10px;align-items:baseline}
  #hudDist{font-size:34px;color:#fff;font-style:italic;text-shadow:0 0 12px rgba(163,255,60,.9),0 3px 0 #123,0 4px 10px #000;letter-spacing:1px}
  #hudDistU{font-size:18px;color:#a3ff3c;text-shadow:0 2px 6px #000}
  #hudCoins{font-size:20px;color:#ffd23f;text-shadow:0 0 10px rgba(255,180,20,.8),0 3px 6px #000;font-style:italic;margin-top:2px}
  #over{background:rgba(4,12,10,.78);backdrop-filter:blur(4px);justify-content:center;display:none}
  #over img.rekt{width:min(72vw,380px);filter:drop-shadow(0 0 34px rgba(255,80,20,.55));animation:slam .38s cubic-bezier(.2,2.4,.4,1) both}
  #over img.logo{width:min(30vw,150px);margin-top:14px;filter:drop-shadow(0 0 18px rgba(163,255,60,.35));border-radius:20px}
  @keyframes slam{0%{transform:scale(2.6) rotate(-7deg);opacity:0}100%{transform:scale(1) rotate(-3deg);opacity:1}}
  .stat{color:#fff;font-size:20px;margin-top:10px;text-shadow:0 2px 8px #000;letter-spacing:1px}
  .stat b{color:#ffd23f}
  #newBest{color:#a3ff3c;font-size:22px;margin-top:8px;text-shadow:0 0 14px rgba(163,255,60,.9);display:none;animation:pulse 1s infinite alternate}
  @keyframes pulse{from{transform:scale(1)}to{transform:scale(1.12)}}
  #againBtn{margin-top:22px;padding:14px 34px;border-radius:16px;background:linear-gradient(180deg,#2a3f33,#152820);border:3px solid #a3ff3c;box-shadow:0 0 24px rgba(163,255,60,.4),inset 0 2px 0 rgba(255,255,255,.15)}
  #againBtn span{font-size:24px;font-weight:900;font-style:italic;letter-spacing:2px;background:linear-gradient(180deg,#ffd23f,#ff7a1a,#ff3d2e);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:none;filter:drop-shadow(0 2px 2px rgba(0,0,0,.6))}
  #dev{position:absolute;top:4px;left:4px;color:#0f0;font:12px monospace;display:none;z-index:99;background:rgba(0,0,0,.5);padding:2px 6px}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:6}
</style>
</head>
<body>
<div id="stage"><div id="frame">
  <canvas id="c"></canvas>
  <div id="flash"></div>
  <div id="hud">
    <div class="hudRow"><span id="hudDist">0</span><span id="hudDistU">m</span></div>
    <div id="hudCoins">$ 0</div>
  </div>
  <div id="title" class="screen">
    <div id="titleArt"></div><div id="titleShade"></div>
    <button id="playBtn" class="btn" aria-label="Play"><img src="./assets/play_btn.png" alt="PLAY"></button>
    <div id="hint"></div>
    <div id="bestTitle"></div>
  </div>
  <div id="over" class="screen">
    <img class="rekt" src="./assets/rekt_text.png" alt="">
    <img class="logo" src="./assets/logo_round.png" alt="">
    <div class="stat" id="ovDist"></div>
    <div class="stat" id="ovCoins"></div>
    <div class="stat" id="ovBest"></div>
    <div id="newBest"></div>
    <button id="againBtn" class="btn"><span></span></button>
  </div>
  <button id="mute" class="btn" aria-label="Mute"></button>
  <div id="dev"></div>
</div></div>

  tapToStart: "TAP PLAY TO RUN",
};


// BULL RUN — deterministic simulation core.
// STYLE FORMULA (art contract, embedded per stylization rules): bold cartoon graffiti
// illustration, cel-shaded flat colors with thick dark outlines and a lime-green rim-light
// glow, chunky energetic rounded shapes; environment in deep teal-green night sky fading to
// bright lime at the horizon with dark charcoal skyline silhouettes and warm dark asphalt;
// hero in cream t-shirt, black shorts and chunky white sneakers popping against the dark
// road; hazards in orange-to-red graffiti accents; pickups in glowing gold; vivid urban
// night-race mood; high contrast, clean readable silhouettes, consistent third-person
// chase-camera perspective across all assets.
// Runs headless (node) and in-browser. No rendering, no timers, no DOM.

const CFG = {
  baseSpeed: 18,          // m/s
  speedPerMeter: 1 / 150, // +1 m/s per 150 m
  maxSpeed: 42,
  jumpV: 7.8,             // m/s
  gravity: 22,            // m/s^2
  hurdleHeight: 0.8,      // m — must be above this when crossing
  laneLerp: 7.5,          // lanes per second toward target
  viewDist: 130,          // m spawn horizon
  gapSecStart: 1.1,
  gapSecFloor: 0.62,
  gapRampDist: 1500,
  doubleRampStart: 200,
  doubleRampFull: 1500,
  doubleMaxWeight: 0.45,
  collideZ: 0.5,
  coinZ: 2.6,        // collect a step ahead of the sprite (player renders at z=2)
  coinLaneTol: 0.55,
  coinHeightTol: 0.85,
  inputBufferSec: 0.12,   // jump buffer >= 100 ms
};

function makeRNG(seed) {
  let s = seed >>> 0;
  return function rng() {
    s = (s + 0x6d2b79f5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function createSim(seed) {
  return {
    rng: makeRNG(seed),
    seed,
    t: 0,
    dist: 0,
    runPhase: 0,
    speed: CFG.baseSpeed,
    coins: 0,
    alive: true,
    crashType: null,
    player: {
      lane: 1, laneF: 1,
      y: 0, vy: 0, airborne: false,
      jumpBuf: 0, coyote: 0,
      squashX: 1, squashY: 1,
    },
    entities: [],        // {kind:'wall'|'hurdle'|'coin', lane, z(abs meters), h, taken}
    spawnCursor: 60,     // absolute meters of next pattern row
    lastForcedLane: 1,   // lane guaranteed passable in previous row
    events: [],          // drained by the renderer: {type, ...}
  };
}

function gapSec(dist) {
  const k = Math.min(1, dist / CFG.gapRampDist);
  return CFG.gapSecStart + (CFG.gapSecFloor - CFG.gapSecStart) * k;
}

function pickWeighted(rng, items) {
  let tot = 0;
  for (const it of items) tot += it.w;
  let r = rng() * tot;
  for (const it of items) { r -= it.w; if (r <= 0) return it.id; }
  return items[items.length - 1].id;
}

function spawnPattern(s) {
  const rng = s.rng, d = s.spawnCursor;
  const dd = Math.max(0, Math.min(1, (s.dist - CFG.doubleRampStart) / (CFG.doubleRampFull - CFG.doubleRampStart)));
  const wDouble = dd * CFG.doubleMaxWeight;
  const kind = pickWeighted(rng, [
    { id: 'coins',      w: 0.20 },
    { id: 'wall1',      w: 0.24 },
    { id: 'hurdle1',    w: 0.24 },
    { id: 'wall2',      w: wDouble * 0.6 },
    { id: 'wallhurdle', w: wDouble * 0.4 },
  ]);
  const lanes = [0, 1, 2];
  const rlane = () => lanes[Math.floor(rng() * 3)];
  const passable = new Set([0, 1, 2]);

  if (kind === 'coins') {
    const L = rlane();
    const n = 5 + Math.floor(rng() * 3);
    for (let i = 0; i < n; i++) s.entities.push({ kind: 'coin', lane: L, z: d + i * 3, h: 0, taken: false });
  } else if (kind === 'wall1') {
    const L = rlane();
    s.entities.push({ kind: 'wall', lane: L, z: d });
    passable.delete(L);
    if (rng() < 0.5) { // coin trail on a safe lane
      const open = [...passable][Math.floor(rng() * passable.size)];
      for (let i = 0; i < 4; i++) s.entities.push({ kind: 'coin', lane: open, z: d - 3 + i * 3, h: 0, taken: false });
    }
  } else if (kind === 'hurdle1') {
    const L = rlane();
    s.entities.push({ kind: 'hurdle', lane: L, z: d });
    if (rng() < 0.55) { // jump-arc coins over the hurdle
      const arcZ = [-4, -2, 0, 2, 4], arcH = [0.3, 0.9, 1.25, 0.9, 0.3];
      for (let i = 0; i < 5; i++) s.entities.push({ kind: 'coin', lane: L, z: d + arcZ[i], h: arcH[i], taken: false });
    }
  } else if (kind === 'wall2') {
    const open = rlane();
    for (const L of lanes) if (L !== open) s.entities.push({ kind: 'wall', lane: L, z: d });
    passable.clear(); passable.add(open);
    if (rng() < 0.6) for (let i = 0; i < 4; i++) s.entities.push({ kind: 'coin', lane: open, z: d - 3 + i * 3, h: 0, taken: false });
  } else { // wallhurdle: wall one lane, hurdle another, one lane free
    const wl = rlane();
    let hl = rlane(); while (hl === wl) hl = rlane();
    s.entities.push({ kind: 'wall', lane: wl, z: d });
    s.entities.push({ kind: 'hurdle', lane: hl, z: d });
    passable.delete(wl); // hurdle lane is passable by jumping
  }

  // Invariant (thresholds.md): at least one passable lane per row.
  if (passable.size === 0) throw new Error('generator invariant violated: all lanes blocked');
  s.lastForcedLane = [...passable][0];
  s.spawnCursor = d + Math.max(8, s.speed * gapSec(s.dist));
}

// input: {left:bool, right:bool, jump:bool} — edge-triggered commands for this step
function stepSim(s, dt, input) {
  if (!s.alive) return;
  const p = s.player;
  s.t += dt;
  s.speed = Math.min(CFG.maxSpeed, CFG.baseSpeed + s.dist * CFG.speedPerMeter);
  s.dist += s.speed * dt;
  // run-cycle cadence: 1.5 cycles/s at base speed, up to 2.4 at max — reads as fast strides, not a blur
  s.runPhase += dt * (1.5 + 0.9 * (s.speed - CFG.baseSpeed) / (CFG.maxSpeed - CFG.baseSpeed));

  // spawn ahead
  while (s.spawnCursor < s.dist + CFG.viewDist) spawnPattern(s);

  // lane input
  if (input.left)  { p.lane = Math.max(0, p.lane - 1); s.events.push({ type: 'lane' }); }
  if (input.right) { p.lane = Math.min(2, p.lane + 1); s.events.push({ type: 'lane' }); }
  const dl = p.lane - p.laneF;
  const step = CFG.laneLerp * dt;
  p.laneF = Math.abs(dl) <= step ? p.lane : p.laneF + Math.sign(dl) * step;

  // jump input with buffer
  if (input.jump) p.jumpBuf = CFG.inputBufferSec;
  else p.jumpBuf = Math.max(0, p.jumpBuf - dt);
  if (p.jumpBuf > 0 && !p.airborne) {
    p.airborne = true; p.vy = CFG.jumpV; p.jumpBuf = 0;
    p.squashX = 0.82; p.squashY = 1.18;
    s.events.push({ type: 'jump' });
  }
  if (p.airborne) {
    p.vy -= CFG.gravity * dt;
    p.y += p.vy * dt;
    if (p.y <= 0) {
      p.y = 0; p.vy = 0; p.airborne = false;
      p.squashX = 1.22; p.squashY = 0.8;
      s.events.push({ type: 'land' });
    }
  }
  // squash decay
  p.squashX += (1 - p.squashX) * Math.min(1, 10 * dt);
  p.squashY += (1 - p.squashY) * Math.min(1, 10 * dt);

  // entities: collide / collect / cull
  const px = p.laneF;
  for (const e of s.entities) {
    const z = e.z - s.dist;
    if (e.kind === 'coin') {
      if (!e.taken && Math.abs(z) < CFG.coinZ && Math.abs(px - e.lane) < CFG.coinLaneTol
          && Math.abs(p.y - e.h) < CFG.coinHeightTol) {
        e.taken = true; s.coins++;
        s.events.push({ type: 'coin', lane: e.lane, h: e.h });
      }
    } else if (Math.abs(z) < CFG.collideZ && Math.abs(px - e.lane) < 0.5) {
      const cleared = e.kind === 'hurdle' && p.y > CFG.hurdleHeight;
      if (!cleared) {
        s.alive = false; s.crashType = e.kind;
        s.events.push({ type: 'crash', kind: e.kind });
        return;
      }
    }
  }
  if (s.entities.length > 220) s.entities = s.entities.filter(e => e.z - s.dist > -12 && !e.taken);
}

function drainEvents(s) { const ev = s.events; s.events = []; return ev; }

// ---------- canvas sizing ----------
const DPR_CAP = 2;
let W=0,H=0;
function resize(){
  const r = frame.getBoundingClientRect();
  const dpr = Math.min(devicePixelRatio||1, DPR_CAP);
  W = r.width; H = r.height;
  canvas.width = Math.round(W*dpr); canvas.height = Math.round(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener("resize", resize); addEventListener("orientationchange", resize); resize();

// ---------- input: everything becomes edge-triggered commands ----------
const BIND = { ArrowLeft:"left", KeyA:"left", ArrowRight:"right", KeyD:"right",
               Space:"jump", ArrowUp:"jump", KeyW:"jump" };
let pending = { left:false, right:false, jump:false };
addEventListener("keydown", e=>{
  const c = BIND[e.code];
  if (c){ e.preventDefault(); if(!e.repeat) pending[c]=true; }
  if (e.code==="Space" || e.code==="Enter"){ if (state!=="running") uiAdvance(); }
});
// touch: swipe / tap
let tS=null;
frame.addEventListener("touchstart", e=>{ const t=e.changedTouches[0]; tS={x:t.clientX,y:t.clientY,t:performance.now()}; }, {passive:true});
frame.addEventListener("touchend", e=>{
  if(!tS) return; const t=e.changedTouches[0];
  const dx=t.clientX-tS.x, dy=t.clientY-tS.y, dt=performance.now()-tS.t; tS=null;
  if (state!=="running") return;
  if (Math.abs(dx)>28 && Math.abs(dx)>Math.abs(dy)) pending[dx<0?"left":"right"]=true;
  else if (dy<-28) pending.jump=true;
  else if (dt<300 && Math.abs(dx)<14 && Math.abs(dy)<14) pending.jump=true;
}, {passive:true});
// gamepad: standard mapping, edge detection
const PAD = { 14:"left", 15:"right", 0:"jump", 12:"jump" };
let padPrev = {};
function pollPad(){
  for (const gp of navigator.getGamepads?.()??[]) if (gp){
    gp.buttons.forEach((b,i)=>{
      const c=PAD[i]; if(!c) return;
      const was=padPrev[i]||false;
      if (b.pressed && !was){ if(state==="running") pending[c]=true; else if(c==="jump") uiAdvance(); }
      padPrev[i]=b.pressed;
    });
    const ax=gp.axes[0]||0, was=padPrev.ax||0;
    if (ax<-0.6 && was>=-0.6 && state==="running") pending.left=true;
    if (ax>0.6 && was<=0.6 && state==="running") pending.right=true;
    padPrev.ax=ax;
  }
}

// ---------- projection ----------
const CAM_D = 6, PLAYER_Z = 2;
const horizonY = () => H*0.335;
const bottomY  = () => H*0.985;
const proj = z => CAM_D/(CAM_D+z);
const yAt = p => horizonY() + (bottomY()-horizonY())*p;
const roadHalf = p => W*0.62*p;
const laneX = (lane,p) => W/2 + (lane-1)*roadHalf(p)*0.68;
const meterPx = p => H*0.16*p;

// ---------- game state ----------
let state="title", sim=null, shake=0, flashT=0, crashT=0;
let ops=0; // draw-op counter for dev overlay

}

  for(const p of parts)p.on=false; for(const p of pops)p.on=false;

}

    $("ovBest").innerHTML = `${STR.best}: <b>${Math.max(d,prev)} ${STR.distanceUnit}</b>`;
    $("newBest").style.display = nb ? "block" : "none";
  }, 550);
}

// ---------- render helpers ----------
function drawSky(){
  const hz=horizonY();
  const g=ctx.createLinearGradient(0,0,0,hz*1.25);
  g.addColorStop(0,"#0a2e26"); g.addColorStop(0.62,"#14523c"); g.addColorStop(1,"#7cd93a");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,hz+2); ops++;
  const sky=IMG.sky;
  if(sky){
    // static skyline (no parallax) — only the clean top 62% of the art;
    // the source image's lower third is rough foreground blocks, cropped out
    const srcH = sky.height*0.62;
    const sw = W, sh = W*srcH/sky.width;
    ctx.globalAlpha=0.92;
    ctx.drawImage(sky, 0,0, sky.width,srcH, 0, hz-sh+4, sw, sh); ops++;
    ctx.globalAlpha=1;
  }
  // horizon glow
  const gg=ctx.createLinearGradient(0,hz-14,0,hz+22);
  gg.addColorStop(0,"rgba(163,255,60,0)"); gg.addColorStop(0.5,"rgba(163,255,60,.5)"); gg.addColorStop(1,"rgba(163,255,60,0)");
  ctx.fillStyle=gg; ctx.fillRect(0,hz-14,W,36); ops++;
}
function drawRoad(){
  const hz=horizonY(), by=bottomY();
  // ground beside the road — repainted every frame so stray draws never accumulate
  const gnd=ctx.createLinearGradient(0,hz,0,H);
  gnd.addColorStop(0,"#0c1f1a"); gnd.addColorStop(1,"#071009");
  ctx.fillStyle=gnd; ctx.fillRect(0,hz,W,H-hz); ops++;
  // asphalt
  const g=ctx.createLinearGradient(0,hz,0,by);
  g.addColorStop(0,"#26231f"); g.addColorStop(1,"#3a352c");
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(W/2-roadHalf(proj(0))*1.05, by);
  ctx.lineTo(W/2, hz); // converge all the way to the skyline vanishing point
  ctx.lineTo(W/2+roadHalf(proj(0))*1.05, by);
  ctx.closePath(); ctx.fill(); ops++;
  // glowing lime edges
  for(const s of [-1,1]){
    ctx.strokeStyle="rgba(163,255,60,.85)"; ctx.lineWidth=Math.max(3,W*0.008);
    ctx.shadowColor="rgba(163,255,60,.9)"; ctx.shadowBlur=12;
    ctx.beginPath();
    ctx.moveTo(W/2+s*roadHalf(proj(0))*1.05, by);
    ctx.lineTo(W/2, hz);
    ctx.stroke(); ops++;
    ctx.shadowBlur=0;
  }
  // dashed yellow lane dividers, scrolling with distance
  const dist = sim?sim.dist:0;
  ctx.fillStyle="#ffd23f";
  const DASH=3.2, PERIOD=7.2;
  for(const lb of [-0.5,0.5]){
    let z0 = PERIOD - (dist % PERIOD);
    for(let z=z0-PERIOD; z<CFG.viewDist; z+=PERIOD){
      const zA=Math.max(0.01,z), zB=Math.max(0.02,z+DASH);
      if(zB<=0.03) continue;
      const pA=proj(zA), pB=proj(zB);
      const xA=W/2+lb*roadHalf(pA)*0.68, xB=W/2+lb*roadHalf(pB)*0.68;
      const wA=W*0.012*pA, wB=W*0.012*pB;
      if(wA<0.5) continue; // subpixel near the horizon — skip instead of shimmering
      ctx.globalAlpha=Math.min(1,(CFG.viewDist-zA)/25); // ease dashes in from the horizon
      ctx.beginPath();
      ctx.moveTo(xA-wA,yAt(pA)); ctx.lineTo(xA+wA,yAt(pA));
      ctx.lineTo(xB+wB,yAt(pB)); ctx.lineTo(xB-wB,yAt(pB));
      ctx.closePath(); ctx.fill(); ops++;
    }
  }
  ctx.globalAlpha=1;
  // neon vanishing point — the road melts into the glow at the skyline
  const R=W*0.085;
  const vg=ctx.createRadialGradient(W/2,hz,0,W/2,hz,R);
  vg.addColorStop(0,"rgba(210,255,140,.95)");
  vg.addColorStop(0.35,"rgba(163,255,60,.55)");
  vg.addColorStop(1,"rgba(163,255,60,0)");
  ctx.fillStyle=vg;
  ctx.fillRect(W/2-R,hz-R,R*2,R*2); ops++;
}
function drawEntity(e){
  const z=e.z-sim.dist;
  if(z<-4.2||z>CFG.viewDist) return;
  const p=proj(z);                 // negative z -> p>1: object grows and flows past below
  if(p<=0.05||p>3.4) return;
  const x=laneX(e.lane,p), yGround=yAt(p), m=meterPx(p);
  if(yGround-H>m*3) return;        // fully below the canvas — cull
  // fade out behind the camera, fade in near the spawn horizon (no pop-in)
  const fade = z<0 ? Math.max(0, 1 - (-z)/4.2) : Math.min(1, (CFG.viewDist - z)/18);
  ctx.globalAlpha = Math.max(0, fade);
  if(e.kind==="coin"){
    if(e.taken){ ctx.globalAlpha=1; return; }
    const img=IMG.coin, s=m*0.62;
    const bob=Math.sin(sim.t*6+e.z*0.5)*m*0.05;
    const y=yGround - e.h*m - s*0.55 + bob;
    if(img){ ctx.drawImage(img, x-s/2, y-s/2, s, s); ops++; }
  } else if(e.kind==="wall"){
    const img=IMG.wall, h=m*2.35, w=h*(img?img.width/img.height:1);
    if(img){ ctx.drawImage(img, x-w/2, yGround-h, w, h); ops++; }
  } else {
    const img=IMG.hurdle, h=m*0.85, w=h*(img?img.width/img.height:1.7);
    if(img){ ctx.drawImage(img, x-w/2, yGround-h, w, h); ops++; }
  }
  ctx.globalAlpha=1;
}
function drawPlayer(){
  const p=proj(PLAYER_Z), pl=sim.player;
  const m=meterPx(p);
  const x=laneX(pl.laneF,p);
  const yGround=yAt(p);
  // 8-frame run cycle driven by runPhase (speed-scaled cadence, see stepSim)
  let img;
  if (pl.airborne) img = IMG.jump;
  else {
    const f = Math.floor((sim.runPhase % 1) * 8) % 8;
    img = IMG["run"+f] || IMG.run0;
  }
  const lean=(pl.lane-pl.laneF)*0.35;
  const hh=m*1.9*pl.squashY, ww=hh*(img?img.width/img.height:0.7)*pl.squashX;
  const y=yGround - pl.y*m;
  // shadow
  ctx.fillStyle="rgba(0,0,0,.4)";
  ctx.beginPath();
  ctx.ellipse(x, yGround-2, ww*0.34*(1-pl.y*0.18), m*0.09*(1-pl.y*0.18), 0, 0, Math.PI*2);
  ctx.fill(); ops++;
  ctx.save();
  ctx.translate(x,y-hh*0.5);
  ctx.rotate(lean);
  // run bob
  // run bob synced to the stride phase
  if(!pl.airborne){ ctx.translate(0, -Math.abs(Math.sin(sim.runPhase*Math.PI*2))*m*0.05); }
  if(img){ ctx.drawImage(img,-ww/2,-hh/2,ww,hh); ops++; }
  ctx.restore();
}
function drawParticles(dt){
  for(const p of parts){
    if(!p.on) continue;
    p.life-=dt; if(p.life<=0){p.on=false;continue;}
    p.vy+=p.grav*dt; p.x+=p.vx*dt; p.y+=p.vy*dt;
    const a=Math.max(0,p.life/p.max);
    ctx.globalAlpha=a;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*(0.5+a*0.5),0,Math.PI*2); ctx.fill(); ops++;
  }
  ctx.globalAlpha=1;
  ctx.font=`bold ${Math.round(H*0.028)}px "Arial Black",Arial`;
  for(const p of pops){
    if(!p.on) continue;
    p.life-=dt; if(p.life<=0){p.on=false;continue;}
    p.y-=H*0.08*dt;
    ctx.globalAlpha=Math.min(1,p.life*2);
    ctx.fillStyle="#ffd23f"; ctx.strokeStyle="rgba(0,0,0,.7)"; ctx.lineWidth=3;
    ctx.strokeText(STR.plusOne,p.x,p.y); ctx.fillText(STR.plusOne,p.x,p.y); ops+=2;
  }
  ctx.globalAlpha=1;
}

// ---------- events → juice ----------
function handleEvents(){
  for(const ev of drainEvents(sim)){
    const p=proj(PLAYER_Z), px=laneX(sim.player.laneF,p), py=yAt(p);
    if(ev.type==="jump"){ sfx("sfx_jump",0.7);
      for(let i=0;i<8;i++) spawnP(px+(Math.random()-0.5)*30, py-4, (Math.random()-0.5)*120, -Math.random()*60, 0.5, 3+Math.random()*3, "#bdb49a", 260);
    }
    if(ev.type==="land"){
      for(let i=0;i<14;i++) spawnP(px+(Math.random()-0.5)*46, py-3, (Math.random()-0.5)*220, -Math.random()*100, 0.55, 3+Math.random()*4, "#cfc6a8", 300);
    }
    if(ev.type==="lane"){
      for(let i=0;i<5;i++) spawnP(px+(Math.random()-0.5)*26, py-4, (Math.random()-0.5)*160, -Math.random()*40, 0.4, 2.5+Math.random()*2.5, "#bdb49a", 240);
    }
    if(ev.type==="coin"){ sfx("sfx_coin",0.8);
      const cy=py - ev.h*meterPx(p) - meterPx(p)*0.5;
      const cx=laneX(ev.lane,p);
      for(let i=0;i<10;i++){ const a=Math.random()*Math.PI*2, v=60+Math.random()*160;
        spawnP(cx,cy,Math.cos(a)*v,Math.sin(a)*v,0.5,2.5+Math.random()*2.5,i%2?"#ffd23f":"#fff2a8",120); }
      spawnPop(cx,cy);
    }
    if(ev.type==="crash"){ sfx("sfx_crash",1); shake=16; flashT=0.22;
      for(let i=0;i<24;i++){ const a=Math.random()*Math.PI*2, v=120+Math.random()*260;
        spawnP(px,py-meterPx(p)*0.9,Math.cos(a)*v,Math.sin(a)*v,0.7,3+Math.random()*4,i%3?"#ff7a1a":"#ff3d2e",380); }
      gameOver();
    }
  }
}

// ---------- run-continuous dust ----------
let dustAcc=0;
function runningDust(dt){
  if(!sim||!sim.alive||sim.player.airborne) return;
  dustAcc+=dt;
  const every=0.06;
  while(dustAcc>every){ dustAcc-=every;
    const p=proj(PLAYER_Z), px=laneX(sim.player.laneF,p), py=yAt(p);
    spawnP(px+(Math.random()-0.5)*20, py-3, (Math.random()-0.5)*50, -20-Math.random()*40, 0.4, 2+Math.random()*2.5, "rgba(200,190,160,0.8)", 160);
  }
}

// ---------- main loop: fixed timestep sim ----------
const STEP=1000/60;
let acc=0,last=performance.now(),paused=false;
let frames=0,fpsAt=last,fps=0,opsShown=0;
addEventListener("blur",()=>paused=true);
addEventListener("focus",()=>{paused=false;last=performance.now();});
document.addEventListener("visibilitychange",()=>{ if(document.hidden)paused=true; else {paused=false;last=performance.now();} });

function frameFn(now){
  requestAnimationFrame(frameFn);
  if(paused){ last=now; return; }
  acc+=now-last; last=now;
  if(acc>250)acc=250;
  pollPad();
  while(acc>=STEP){
    if(state==="running"&&sim&&sim.alive){
      stepSim(sim, STEP/1000, pending);
      pending.left=pending.right=pending.jump=false;
      handleEvents();
    } else { pending.left=pending.right=pending.jump=false; }
    acc-=STEP;
  }
  const dt=STEP/1000;
  ops=0;
  ctx.clearRect(0,0,W,H);
  // shake
  ctx.save();
  if(shake>0){ shake*=0.86; if(shake<0.4)shake=0;
    ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); }
  drawSky();
  drawRoad();
  if(sim){
    // painter order: far → near
    const list=sim.entities;
    // insertion-order is roughly far→near by z; sort cheaply by z desc
    list.sort((a,b)=>b.z-a.z);
    for(const e of list) drawEntity(e);
    drawPlayer();
  }
  drawParticles(dt);
  runningDust(dt);
  ctx.restore();
  if(flashT>0){ flashT-=dt; $("flash").style.opacity=Math.max(0,flashT*2.2); }
  // HUD
  if(state==="running"&&sim){
    $("hudDist").textContent=Math.floor(sim.dist);
    $("hudCoins").textContent=`$ ${sim.coins}`;
  }
  if(dev&&(frames++,now-fpsAt>=500)){
    fps=Math.round(frames*1000/(now-fpsAt));frames=0;fpsAt=now;opsShown=ops;
    $("dev").textContent=`${fps} fps · ${opsShown} ops · ${sim?sim.entities.length:0} ent`;
  }
}
imgReady.then(()=>{ showTitle(); if(new URLSearchParams(location.search).has("auto")) startRun(); requestAnimationFrame(frameFn); });
</script>
